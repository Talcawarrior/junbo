# Junbo CI Pipeline
# Her push/PR'da testler otomatik koşsun

name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio hypothesis ruff mypy

    - name: Lint with ruff
      run: |
        ruff check .

    - name: Type check with mypy
      run: |
        mypy --ignore-missing-imports . || true

    - name: Run unit tests
      run: |
        pytest tests/test_units.py -v --tb=short

    - name: Run regression tests
      run: |
        pytest tests/test_regression.py -v --tb=short

    - name: Run property-based tests
      run: |
        pytest tests/test_property_based.py -v --tb=short

    - name: Run golden/snapshot tests
      run: |
        pytest tests/test_golden_snapshot.py -v --tb=short

    - name: Run integration tests
      run: |
        pytest tests/test_integration_e2e.py -v --tb=short

    - name: Run all tests with coverage
      run: |
        pytest tests/ -v --cov=. --cov-report=term-missing --tb=short

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
