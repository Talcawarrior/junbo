[mypy]
python_version = 3.12
ignore_missing_imports = True
check_untyped_defs = False
disallow_untyped_defs = False

# Ignore scripts/ — diagnostic/utility scripts not part of app
[mypy-scripts.*]
ignore_errors = True

# SQLAlchemy ORM models use Column types that confuse mypy
[mypy-database.models]
ignore_errors = True

# Libraries with complex type stubs
[mypy-utils.accounting]
ignore_errors = True

# requests/httpx params dict type variance
[mypy-*.weather_ensemble]
ignore_errors = True

[mypy-*.meteo]
ignore_errors = True

[mypy-*.data_backfiller]
ignore_errors = True

[mypy-*.poly_data_ingest]
ignore_errors = True

# ASI engine complex type chains
[mypy-*.asi_evolve]
ignore_errors = True

[mypy-*.sia_hourly]
ignore_errors = True

[mypy-*.llm_loop_orchestrator]
ignore_errors = True

[mypy-*.bet_placer]
ignore_errors = True

[mypy-*.polymarket]
ignore_errors = True

[mypy-*.calculator]
ignore_errors = True

[mypy-*.researcher_agent]
ignore_errors = True

[mypy-*.resolved_markets_helper]
ignore_errors = True
